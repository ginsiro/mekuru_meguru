name: Mekuru Meguru Auto Processor
on:
  push:
    paths:
      - 'uploads/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install Pillow

      - name: Process Files
        run: python .github/scripts/processor.py

      # --- ここが重要！成果物を倉庫に保存する設定 ---
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-convert WebP and organize files" || echo "No changes to commit"
          git push
